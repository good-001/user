<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThaiNovel - อ่านนิยายออนไลน์ฟรี</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .novel-text { font-family: 'Sarabun', sans-serif; line-height: 1.8; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* ธีมหน้าต่างอ่านนิยาย */
        .theme-light { background-color: #ffffff !important; color: #333333 !important; }
        .theme-sepia { background-color: #f4ecd8 !important; color: #5b4636 !important; }
        .theme-dark { background-color: #1a202c !important; color: #e2e8f0 !important; }
        
        /* ตกแต่ง Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .theme-dark ::-webkit-scrollbar-track { background: #2d3748; }
        .theme-dark ::-webkit-scrollbar-thumb { background: #4a5568; }
    </style>
</head>
<body id="main-body" class="bg-gray-50 text-gray-900 flex flex-col min-h-screen transition-colors duration-300">

    <!-- แถบเมนูด้านบน (ซ่อนเมื่ออยู่ในโหมดอ่าน) -->
    <header id="main-header" class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="goHome()">
                <div class="w-10 h-10 bg-green-600 rounded-xl flex items-center justify-center text-white shadow-sm">
                    <i class="fa-solid fa-book-open text-xl"></i>
                </div>
                <span class="text-2xl font-bold text-green-900 tracking-tight hidden sm:block">ThaiNovel</span>
            </div>

            <div class="flex-1 max-w-xl mx-4 hidden md:block">
                <div class="relative">
                    <input type="text" placeholder="ค้นหานิยาย, นักเขียน..." class="w-full bg-gray-100 rounded-full py-2.5 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-green-500 transition-all text-sm">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button class="text-gray-500 hover:text-green-600 font-medium px-4 transition-colors"><i class="fa-solid fa-user mr-2"></i>เข้าสู่ระบบ</button>
            </div>
        </div>
    </header>

    <!-- พื้นที่แสดงเนื้อหาหลัก -->
    <main id="app-content" class="flex-1 w-full max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 transition-all duration-300">
        <div class="py-20 text-center text-gray-500" id="loading-state">
            <i class="fa-solid fa-spinner fa-spin text-4xl mb-4 text-green-600"></i><br>กำลังดึงข้อมูลนิยายสนุกๆ จากเซิร์ฟเวอร์...
        </div>
    </main>

    <!-- ส่วนท้ายเว็บ (ซ่อนเมื่ออยู่ในโหมดอ่าน) -->
    <footer id="main-footer" class="bg-white border-t border-gray-200 mt-auto py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
            <div class="font-bold text-lg text-gray-700 mb-2">ThaiNovel</div>
            <p>&copy; 2026 แพลตฟอร์มอ่านนิยายออนไลน์ อ่านฟรี อัปเดตไว</p>
        </div>
    </footer>

    <script>
        // 🔥 ใส่ URL ของ Google Apps Script ของคุณตรงนี้ 🔥
        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzA1ZXHWBEXuwp4Gmu8SEc9q8WKUYi33NA8t1AixdE8PF2rXfklGQ6H6Z6vxCW--39J/exec"; 

        // ตัวแปรเก็บข้อมูล
        let novels = [];
        let chapters = [];
        let state = {
            view: 'home', 
            activeNovelId: null,
            activeChapterId: null,
            readerSettings: { fontSize: 18, theme: 'theme-light' },
            chapterCurrentPage: 1,
            chapterItemsPerPage: 50
        };

        // --- 1. ระบบจัดการ URL (Routing) ---
        function getSlug(title) {
            return title.trim().replace(/\s+/g, '-');
        }

        function handleHashChange() {
            const hash = decodeURIComponent(window.location.hash.substring(1));
            
            if (!hash || hash === '/') {
                state.view = 'home';
                state.activeNovelId = null;
                state.activeChapterId = null;
                state.chapterCurrentPage = 1;
            } else {
                const parts = hash.split('/').filter(Boolean);
                
                if (parts.length >= 2) {
                    const slug = parts[0];
                    const action = parts[1];
                    
                    const novel = novels.find(n => getSlug(n.title) === slug || n.id === slug);
                    
                    if (novel) {
                        if (action === 'home') {
                            if (state.activeNovelId !== novel.id) state.chapterCurrentPage = 1; 
                            state.view = 'detail';
                            state.activeNovelId = novel.id;
                        } else if (action.startsWith('ch')) {
                            const chNum = parseInt(action.replace('ch', ''));
                            const chapter = chapters.find(c => c.novelId === novel.id && c.chapterNumber === chNum);
                            
                            if (chapter) {
                                state.view = 'read';
                                state.activeNovelId = novel.id;
                                state.activeChapterId = chapter.id;
                            } else {
                                state.view = 'detail';
                                state.activeNovelId = novel.id;
                                state.chapterCurrentPage = 1;
                            }
                        }
                    } else {
                        state.view = 'home';
                    }
                } else {
                    state.view = 'home';
                }
            }
            render();
        }

        window.addEventListener('hashchange', handleHashChange);

        // --- 2. ฟังก์ชันดึงข้อมูลจาก Google Sheets ---
        async function loadDataFromExcel() {
            try {
                const response = await fetch(GOOGLE_SHEET_API_URL);
                const data = await response.json();
                
                novels = data.novels.map(n => ({
                    ...n,
                    views: parseInt(n.views) || 0,
                    categories: n.categories ? n.categories.toString().split(',').map(s => s.trim()) : []
                }));
                chapters = data.chapters || [];
                
                handleHashChange(); 

            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('loading-state').innerHTML = `
                    <div class="text-red-500">
                        <i class="fa-solid fa-circle-xmark text-4xl mb-4"></i><br>
                        <span class="font-bold text-lg">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</span><br>
                        <span class="text-sm">กรุณาลองรีเฟรชหน้าเว็บใหม่อีกครั้ง</span>
                    </div>
                `;
            }
        }

        loadDataFromExcel();

        // --- 3. ฟังก์ชันหลักสำหรับวาดหน้าจอ ---
        function render(scrollToTop = true) {
            const appDiv = document.getElementById('app-content');
            const mainHeader = document.getElementById('main-header');
            const mainFooter = document.getElementById('main-footer');
            const mainBody = document.getElementById('main-body');

            // ซ่อนแถบเมนูหลักเมื่อเข้าหน้าอ่านนิยาย (เพื่อความ Immersive กว้างเต็มจอ)
            if (state.view === 'read') {
                mainHeader.style.display = 'none';
                mainFooter.style.display = 'none';
                
                // กำหนดคลาสหน้าจออ่าน (เต็มความกว้างและจัดการสีพื้นหลังทั้ง Body)
                appDiv.className = 'w-full';
                mainBody.className = `${state.readerSettings.theme} flex flex-col min-h-screen transition-colors duration-300`;
                
                appDiv.innerHTML = renderReader();
            } else {
                mainHeader.style.display = 'block';
                mainFooter.style.display = 'block';
                
                // คืนค่ารูปแบบปกติให้หน้าหลัก/สารบัญ
                appDiv.className = 'flex-1 w-full max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 transition-all duration-300';
                mainBody.className = `bg-gray-50 text-gray-900 flex flex-col min-h-screen transition-colors duration-300`;
                
                if (state.view === 'home') appDiv.innerHTML = renderHome();
                else if (state.view === 'detail') appDiv.innerHTML = renderNovelDetail();
            }
            
            if (scrollToTop) {
                window.scrollTo(0, 0); 
            }
        }

        // --- เทมเพลต: หน้าแรก (Home) ---
        function renderHome() {
            let html = `
                <div class="mb-8 flex justify-between items-end">
                    <div>
                        <h2 class="text-3xl font-bold text-gray-900 mb-2">อัปเดตนิยายเรื่องใหม่</h2>
                        <p class="text-gray-500">เลือกอ่านนิยายสนุกๆ ได้เลยที่นี่ ฟรี!</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 sm:gap-6">
            `;

            if (novels.length === 0) {
                html += `<div class="col-span-full py-20 text-center text-gray-500 bg-white rounded-2xl border border-dashed border-gray-300">
                    <i class="fa-solid fa-book-open-reader text-4xl text-gray-300 mb-3"></i><br>
                    ยังไม่มีนิยายในระบบ<br><span class="text-sm">รอแอดมินอัปเดตข้อมูลสักครู่นะครับ</span>
                </div>`;
            }

            [...novels].reverse().forEach(novel => {
                let displayViews = novel.views || 0;
                html += `
                    <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all overflow-hidden cursor-pointer group flex flex-col h-full border border-gray-100 transform hover:-translate-y-1" onclick="viewNovel('${novel.id}')">
                        <div class="relative aspect-[2/3] overflow-hidden bg-gray-100">
                            <img src="${novel.cover}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/400x600?text=No+Cover'">
                            <div class="absolute top-2 right-2 bg-black/70 text-white text-xs px-2.5 py-1 rounded-full font-medium backdrop-blur-sm shadow-sm">
                                <i class="fa-solid fa-eye text-[10px] mr-1"></i> ${displayViews.toLocaleString()}
                            </div>
                            <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/60 to-transparent p-3 pt-8">
                                <span class="${novel.status === 'จบแล้ว' || novel.status === 'เสร็จสมบูรณ์แล้ว' ? 'bg-blue-500' : 'bg-green-500'} text-white text-[10px] font-bold px-2 py-0.5 rounded-sm uppercase tracking-wide">${novel.status || 'อัปเดต'}</span>
                            </div>
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="font-bold text-gray-900 leading-tight mb-1 group-hover:text-green-600 line-clamp-2 transition-colors">${novel.title}</h3>
                            <p class="text-sm text-gray-500 mb-3"><i class="fa-solid fa-pen-nib text-[10px] mr-1"></i> ${novel.author}</p>
                            <div class="mt-auto pt-2 border-t border-gray-50 flex flex-wrap gap-1">
                                ${novel.categories && novel.categories.length > 0 
                                    ? novel.categories.slice(0, 2).map(cat => `<span class="text-[10px] bg-green-50 text-green-700 font-medium px-2 py-1 rounded-full">#${cat}</span>`).join('') 
                                    : '<span class="text-[10px] text-gray-400">ไม่มีหมวดหมู่</span>'}
                            </div>
                        </div>
                    </div>
                `;
            });
            return html + `</div>`;
        }

        // --- เทมเพลต: หน้ารายละเอียดนิยาย ---
        function renderNovelDetail() {
            const novel = novels.find(n => n.id === state.activeNovelId);
            if (!novel) return goHome();

            const novelChapters = chapters.filter(c => c.novelId === novel.id).sort((a, b) => a.chapterNumber - b.chapterNumber);
            const totalItems = novelChapters.length;
            const totalPages = Math.ceil(totalItems / state.chapterItemsPerPage);
            
            if (state.chapterCurrentPage > totalPages && totalPages > 0) state.chapterCurrentPage = totalPages;
            if (state.chapterCurrentPage < 1) state.chapterCurrentPage = 1;

            const startIndex = (state.chapterCurrentPage - 1) * state.chapterItemsPerPage;
            const endIndex = startIndex + state.chapterItemsPerPage;
            const paginatedChapters = novelChapters.slice(startIndex, endIndex);

            let chaptersHtml = paginatedChapters.length === 0 
                ? `<div class="p-8 text-center text-gray-500 bg-white border border-dashed border-gray-300 rounded-2xl">ยังไม่มีตอนให้เปิดอ่าน รอผู้เขียนอัปเดตเร็วๆ นี้นะครับ</div>` 
                : '';
            
            paginatedChapters.forEach(ch => {
                chaptersHtml += `
                    <div onclick="readChapter('${ch.id}')" class="flex items-center justify-between p-4 bg-white border border-gray-100 hover:border-green-400 hover:shadow-md rounded-xl cursor-pointer transition-all mb-3 group">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-green-50 text-green-600 rounded-full flex items-center justify-center font-bold text-lg group-hover:bg-green-600 group-hover:text-white transition-colors shadow-sm">
                                ${ch.chapterNumber}
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-800 group-hover:text-green-600 transition-colors text-lg line-clamp-1">ตอนที่ ${ch.chapterNumber}: ${ch.title}</h4>
                                <span class="text-xs text-gray-400">อ่านฟรี</span>
                            </div>
                        </div>
                        <button class="w-10 h-10 rounded-full bg-gray-50 text-gray-400 group-hover:bg-green-50 group-hover:text-green-600 flex items-center justify-center transition-colors shrink-0">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                `;
            });

            let paginationHtml = '';
            if (totalPages > 1) {
                let pageButtons = '';
                let startPage = Math.max(1, state.chapterCurrentPage - 2);
                let endPage = Math.min(totalPages, state.chapterCurrentPage + 2);

                if (state.chapterCurrentPage > 1) {
                    pageButtons += `<button onclick="changeChapterPage(${state.chapterCurrentPage - 1})" class="px-4 py-2 bg-white border border-gray-200 rounded-lg hover:bg-green-50 hover:text-green-700 transition-colors font-medium"><i class="fa-solid fa-chevron-left mr-1"></i> ก่อนหน้า</button>`;
                }

                for (let i = startPage; i <= endPage; i++) {
                    if (i === state.chapterCurrentPage) {
                        pageButtons += `<button class="px-4 py-2 bg-green-600 text-white rounded-lg font-bold shadow-md transform scale-105">${i}</button>`;
                    } else {
                        pageButtons += `<button onclick="changeChapterPage(${i})" class="px-4 py-2 bg-white border border-gray-200 rounded-lg hover:bg-green-50 hover:text-green-700 transition-colors">${i}</button>`;
                    }
                }

                if (state.chapterCurrentPage < totalPages) {
                    pageButtons += `<button onclick="changeChapterPage(${state.chapterCurrentPage + 1})" class="px-4 py-2 bg-white border border-gray-200 rounded-lg hover:bg-green-50 hover:text-green-700 transition-colors font-medium">ถัดไป <i class="fa-solid fa-chevron-right ml-1"></i></button>`;
                }

                paginationHtml = `
                    <div class="mt-8 flex flex-col items-center gap-4">
                        <div class="flex gap-2 flex-wrap justify-center">${pageButtons}</div>
                        <div class="text-sm text-gray-500">กำลังแสดงตอนที่ ${startIndex + 1} ถึง ${Math.min(endIndex, totalItems)} (จากทั้งหมด ${totalItems} ตอน)</div>
                    </div>
                `;
            }

            return `
                <button onclick="goHome()" class="flex items-center gap-2 text-gray-500 hover:text-green-600 font-medium mb-6 transition-colors bg-white px-4 py-2 rounded-full shadow-sm w-fit border border-gray-100">
                    <i class="fa-solid fa-arrow-left"></i> กลับหน้าแรก
                </button>
                
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden mb-10">
                    <div class="flex flex-col md:flex-row">
                        <div class="w-full md:w-1/3 lg:w-1/4 p-6 md:p-8 bg-gray-50 flex justify-center items-start border-b md:border-b-0 md:border-r border-gray-100">
                            <img src="${novel.cover}" class="w-48 md:w-full rounded-xl shadow-lg aspect-[2/3] object-cover" onerror="this.src='https://via.placeholder.com/400x600?text=No+Cover'">
                        </div>
                        <div class="p-6 md:p-10 flex-1 flex flex-col">
                            <div class="flex flex-wrap gap-2 mb-4">
                                <span class="${novel.status === 'เสร็จสมบูรณ์แล้ว' || novel.status === 'จบแล้ว' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'} text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">${novel.status || 'กำลังเผยแพร่'}</span>
                                ${novel.categories ? novel.categories.map(cat => `<span class="bg-gray-100 text-gray-600 text-xs font-medium px-3 py-1 rounded-full">#${cat}</span>`).join('') : ''}
                            </div>
                            
                            <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold text-gray-900 mb-3 leading-tight">${novel.title}</h1>
                            <p class="text-lg text-gray-600 mb-8 flex items-center gap-2"><i class="fa-solid fa-pen-nib text-gray-400"></i> ผู้แต่ง: <span class="font-medium text-gray-900">${novel.author}</span></p>
                            
                            <div class="flex gap-8 mb-8 pb-8 border-b border-gray-100">
                                <div class="text-center">
                                    <div class="text-2xl font-bold text-gray-900 mb-1"><i class="fa-solid fa-eye text-green-600 mr-2 text-xl"></i>${(novel.views || 0).toLocaleString()}</div>
                                    <div class="text-xs text-gray-500 uppercase tracking-wider font-medium">ยอดเข้าชม</div>
                                </div>
                                <div class="text-center">
                                    <div class="text-2xl font-bold text-gray-900 mb-1"><i class="fa-solid fa-layer-group text-blue-600 mr-2 text-xl"></i>${totalItems}</div>
                                    <div class="text-xs text-gray-500 uppercase tracking-wider font-medium">จำนวนตอน</div>
                                </div>
                            </div>
                            
                            <h3 class="text-xl font-bold text-gray-900 mb-4">เรื่องย่อ</h3>
                            <p class="text-gray-600 leading-relaxed novel-text bg-gray-50 p-5 rounded-2xl border border-gray-100 whitespace-pre-line">${novel.synopsis}</p>
                            
                            <div class="mt-8">
                                ${novelChapters.length > 0 
                                    ? `<button onclick="readChapter('${novelChapters[0].id}')" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-10 rounded-full shadow-lg shadow-green-200 transition-all transform hover:-translate-y-1 w-full md:w-auto text-lg"><i class="fa-solid fa-book-open-reader mr-2"></i> เริ่มอ่านตอนแรกเลย</button>` 
                                    : ''}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- สารบัญตอน -->
                <div class="max-w-4xl mx-auto" id="chapter-list-section">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-bold text-gray-900 flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-green-100 flex items-center justify-center text-green-600"><i class="fa-solid fa-list-ul"></i></div>
                            สารบัญตอนทั้งหมด
                        </h3>
                    </div>
                    
                    <div class="flex flex-col">
                        ${chaptersHtml}
                    </div>
                    
                    ${paginationHtml}
                </div>
            `;
        }

        // --- เทมเพลต: หน้าอ่านนิยาย (Reader) ขยายเต็มจอและแถบลอยตายตัว ---
        function renderReader() {
            const chapter = chapters.find(c => c.id === state.activeChapterId);
            if (!chapter) return viewNovel(state.activeNovelId);
            
            const novel = novels.find(n => n.id === chapter.novelId);
            const novelChapters = chapters.filter(c => c.novelId === novel.id).sort((a, b) => a.chapterNumber - b.chapterNumber);
            const currentIndex = novelChapters.findIndex(c => c.id === chapter.id);
            const prevCh = currentIndex > 0 ? novelChapters[currentIndex - 1] : null;
            const nextCh = currentIndex < novelChapters.length - 1 ? novelChapters[currentIndex + 1] : null;

            // กำหนดสีของแถบ Navbar ให้เข้ากับ Theme ที่ผู้ใช้เลือก
            let navClass = "bg-white/95 border-gray-200 text-gray-900";
            if (state.readerSettings.theme === 'theme-sepia') {
                navClass = "bg-[#f4ecd8]/95 border-[#e0d6be] text-[#5b4636]";
            } else if (state.readerSettings.theme === 'theme-dark') {
                navClass = "bg-[#1a202c]/95 border-gray-700 text-[#e2e8f0]";
            }

            return `
                <!-- คอนเทนเนอร์หลักของหน้าอ่าน -->
                <div class="w-full">
                    
                    <!-- แถบเมนูลอยตัว (Fixed Navbar) ติดบนสุดตลอดเวลา -->
                    <div class="fixed top-0 left-0 w-full z-50 ${navClass} backdrop-blur-md border-b shadow-sm transition-colors duration-300">
                        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center gap-2">
                            
                            <!-- ปุ่มกลับสารบัญ -->
                            <button onclick="viewNovel('${novel.id}')" class="flex items-center gap-2 font-bold hover:opacity-70 px-2 py-1.5 rounded-lg transition-colors">
                                <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">สารบัญ</span>
                            </button>
                            
                            <!-- เครื่องมือปรับแต่ง -->
                            <div class="flex items-center gap-3 sm:gap-6">
                                <!-- ขนาดอักษร -->
                                <div class="flex items-center gap-2 sm:gap-4 bg-black/5 dark:bg-white/10 px-4 py-1.5 rounded-full">
                                    <span class="text-xs sm:text-sm font-bold opacity-70 hidden sm:inline">ขนาดอักษร</span>
                                    <button onclick="changeFontSize(-2)" class="w-8 h-8 flex items-center justify-center rounded-full bg-white dark:bg-gray-800 shadow-sm hover:opacity-80 font-bold text-gray-900 dark:text-white">-</button>
                                    <span class="text-sm font-bold w-6 text-center" id="font-size-display">${state.readerSettings.fontSize}</span>
                                    <button onclick="changeFontSize(2)" class="w-8 h-8 flex items-center justify-center rounded-full bg-white dark:bg-gray-800 shadow-sm hover:opacity-80 font-bold text-gray-900 dark:text-white">+</button>
                                </div>
                                
                                <!-- โหมดสี -->
                                <div class="flex items-center gap-2">
                                    <button onclick="changeTheme('theme-light')" class="w-8 h-8 rounded-full border-2 border-gray-300 bg-white shadow-sm" title="สว่าง"></button>
                                    <button onclick="changeTheme('theme-sepia')" class="w-8 h-8 rounded-full border-2 border-gray-300 bg-[#f4ecd8] shadow-sm" title="ถนอมสายตา"></button>
                                    <button onclick="changeTheme('theme-dark')" class="w-8 h-8 rounded-full border-2 border-gray-500 bg-[#1a202c] shadow-sm" title="มืด"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- พื้นที่เนื้อหานิยาย (กว้างเต็มจอ และเว้นระยะด้านบนหลบ Navbar) -->
                    <div class="pt-24 pb-32 max-w-5xl mx-auto px-4 sm:px-8 md:px-12 w-full">
                        <h4 class="text-center font-bold opacity-50 mb-3 uppercase tracking-wider text-sm mt-4">${novel.title}</h4>
                        <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold text-center mb-12 pb-8 border-b border-current border-opacity-10 leading-tight">ตอนที่ ${chapter.chapterNumber} : ${chapter.title}</h1>
                        
                        <div class="novel-text content-area transition-all duration-300 min-h-[50vh] whitespace-pre-line" style="font-size: ${state.readerSettings.fontSize}px;">
                            ${chapter.content}
                        </div>
                        
                        <!-- ปุ่มเปลี่ยนตอนด้านล่าง -->
                        <div class="mt-20 pt-8 border-t border-current border-opacity-10 flex justify-between items-center pb-10">
                            ${prevCh 
                                ? `<button onclick="readChapter('${prevCh.id}')" class="flex items-center gap-2 px-6 py-3.5 rounded-full border-2 border-current opacity-60 hover:opacity-100 font-bold transition-all"><i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">ตอนก่อนหน้า</span></button>` 
                                : `<div></div>`}
                            
                            ${nextCh 
                                ? `<button onclick="readChapter('${nextCh.id}')" class="flex items-center gap-2 px-8 py-3.5 rounded-full bg-green-600 text-white hover:bg-green-700 font-bold shadow-lg shadow-green-600/30 transition-all transform hover:-translate-y-1"><span class="hidden sm:inline">ตอนถัดไป</span> <i class="fa-solid fa-arrow-right"></i></button>` 
                                : `<div class="opacity-40 font-bold px-6 py-3 flex flex-col items-center"><i class="fa-solid fa-flag-checkered text-xl mb-1"></i> จบตอนล่าสุดแล้ว</div>`}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- 4. การควบคุมและเปลี่ยนหน้า ---

        window.goHome = function() { 
            window.location.hash = '/'; 
        }
        
        window.viewNovel = function(id) {
            let n = novels.find(n => n.id === id);
            if (!n) return;

            if (state.view === 'home') {
                n.views += 1; 
                fetch(GOOGLE_SHEET_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'incrementView', id: id })
                }).catch(e => console.error("Error updating views:", e));
            }
            
            window.location.hash = `/${getSlug(n.title)}/home`;
        }

        window.changeChapterPage = function(pageNumber) {
            state.chapterCurrentPage = pageNumber;
            render(false);
            const chapterSection = document.getElementById('chapter-list-section');
            if (chapterSection) {
                const yOffset = -80; 
                const y = chapterSection.getBoundingClientRect().top + window.pageYOffset + yOffset;
                window.scrollTo({top: y, behavior: 'smooth'});
            }
        }

        window.readChapter = function(id) {
            const ch = chapters.find(c => c.id === id);
            if (!ch) return;
            const n = novels.find(n => n.id === ch.novelId);
            if (!n) return;

            window.location.hash = `/${getSlug(n.title)}/ch${ch.chapterNumber}`;
        }

        window.changeFontSize = function(delta) {
            let newSize = state.readerSettings.fontSize + delta;
            if (newSize >= 14 && newSize <= 42) {
                state.readerSettings.fontSize = newSize;
                document.getElementById('font-size-display').innerText = newSize;
                document.querySelector('.content-area').style.fontSize = newSize + 'px';
            }
        }

        window.changeTheme = function(themeName) {
            state.readerSettings.theme = themeName;
            
            // บังคับเปลี่ยนสี background ทั้งหน้ากระดาษทันทีเมื่อกดปุ่มเปลี่ยนสี
            if (state.view === 'read') {
                document.getElementById('main-body').className = `${themeName} flex flex-col min-h-screen transition-colors duration-300`;
            }
            
            // สั่ง render เพื่อให้ตัว Navbar ด้านบนอัปเดตสีตามไปด้วยแบบไม่เลื่อนหน้าจอ
            render(false);
        }

    </script>
</body>
</html>
